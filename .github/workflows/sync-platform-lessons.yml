name: Sync Platform Content

on:
  push:
    branches: [main]
    paths:
      - "src/content/**"
      - "src/data/**"
      - "src/styles/**"
      - "scripts/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/sync-platform-lessons.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PLATFORM_REPOSITORY: ${{ vars.PLATFORM_REPOSITORY || 'solarpower101/solarpower101-platform' }}
      PLATFORM_LESSON_INDEX_PATH: ${{ vars.PLATFORM_LESSON_INDEX_PATH || 'packages/domain/src/generated/solar-power-101.lesson-index.json' }}
      PLATFORM_BOOK_OUTPUT_PATH: ${{ vars.PLATFORM_BOOK_OUTPUT_PATH || 'apps/web/public/book' }}

    steps:
      - name: Checkout book
        uses: actions/checkout@v4
        with:
          path: book

      - name: Checkout visualization dependency
        uses: actions/checkout@v4
        with:
          repository: solarpower101/solarpower101-visualization
          path: solarpower101-visualization
          token: ${{ secrets.VISUALIZATION_REPO_TOKEN || secrets.PLATFORM_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: book/package-lock.json

      - name: Install book dependencies
        working-directory: book
        run: npm ci

      - name: Validate, export lesson index, and build public book
        working-directory: book
        run: |
          npm run validate
          npm run export:public-index
          mv src/content/docs/premium "$RUNNER_TEMP/premium-docs"
          npm run build

      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PLATFORM_REPOSITORY || 'solarpower101/solarpower101-platform' }}
          token: ${{ secrets.PLATFORM_REPO_TOKEN }}
          path: platform

      - name: Copy generated lesson index
        run: |
          mkdir -p "platform/$(dirname "$PLATFORM_LESSON_INDEX_PATH")"
          cp book/src/data/lesson-index.json "platform/$PLATFORM_LESSON_INDEX_PATH"

      - name: Copy built book pages
        run: |
          rm -rf "platform/$PLATFORM_BOOK_OUTPUT_PATH"
          mkdir -p "platform/$PLATFORM_BOOK_OUTPUT_PATH"
          cp -R book/dist/. "platform/$PLATFORM_BOOK_OUTPUT_PATH/"

      - name: Open platform pull request
        working-directory: platform
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_REPO_TOKEN }}
        run: |
          branch="sync/book-content-${GITHUB_SHA}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add "$PLATFORM_LESSON_INDEX_PATH" "$PLATFORM_BOOK_OUTPUT_PATH"

          if git diff --cached --quiet -- "$PLATFORM_LESSON_INDEX_PATH" "$PLATFORM_BOOK_OUTPUT_PATH"; then
            echo "No platform lesson manifest or book build changes to sync."
            exit 0
          fi

          git commit -m "Sync SolarPower101 book content"
          git push -f origin "$branch"

          gh pr create \
            --title "Sync SolarPower101 book content" \
            --body "Generated from solarpower101-book commit ${GITHUB_SHA}. Includes the public lesson manifest and built /book pages." \
            --base main \
            --head "$branch"
